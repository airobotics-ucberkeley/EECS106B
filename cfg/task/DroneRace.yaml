# Gate settings
gate_scale: 1.0
gate_height: 1.5 
gate_width: 1.5 

# ---- STUDENT EDIT: reward hyperparameters --------------------------------
# Add one line per reward scale you define in drone_race.py __init__.
# They are read via cfg.task.get("key", default). Rename / extend as needed.
#
reward_example: 0.5          # <-- EDIT or replace with your own reward scales
# reward_progress_scale: 1.0
# reward_gate_passage: 10.0
# reward_crash_scale: 5.0
