name: DroneRaceEnv

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

# Task-specific PPO overrides. Points to a file in cfg/algo/ that is merged
# over the default ppo.yaml when this task is loaded.
ppo_cfg: DroneRace.yaml

env:
  num_envs: 500            # <-- EDIT: number of parallel environments
  max_episode_length: 1000 # <-- EDIT: max steps per episode before truncation

sim:
  substeps: 5   # overrides the default of 5
  dt: 0.002 
  
drone_model:
  name: Iris
  controller: RateController

total_frames: 200_000_000
save_interval: 100 
# seed: 0

# Track configuration: config-based track with custom gate positions and orientations
# Gate's local x axis is perpendicular to surface. Center is on the bottom middle. 
# Circular track 
track_config:
  "1":
    pos: [0.0, 0.0, 1.0]
    yaw: 1.57
  "2":
    pos: [5.0, 5.0, 1.0]
    yaw: 0
  "3":
    pos: [10.0, 0.0, 1.0]
    yaw: -1.57
  "4":
    pos: [5.0, -5.0, 1.0]
    yaw: 3.14  # pi
  "5":
    pos: [0.0, 0.0, 1.0]
    yaw: 1.57

